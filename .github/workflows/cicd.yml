name: MLOps CI/CD Pipeline

on:
  push:
    branches:
      - master
    paths:
      - 'diabetes.csv'
      - 'train.py'
      - 'app.py'
      - 'Dockerfile'

jobs:

  train-build-deploy:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install -r requirements.txt

    - name: Train Model
      run: |
        python train.py

    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: anirudh967
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker Image
      run: |
        docker build -t anirudh967/healthcare-ml:latest .

    - name: Push Docker Image
      run: |
        docker push anirudh967/healthcare-ml:latest

    - name: Setup Kubernetes
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBE_CONFIG }}" > $HOME/.kube/config

    - name: Deploy to Kubernetes
      run: |
        kubectl rollout restart deployment healthcare-ml